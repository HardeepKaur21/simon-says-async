<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" class="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="center">
      <div class="mechanism">
        <div class="control-display">
          <div class="high-score">00</div>
          <button id="start-button">START</button>
          <div class="score">00</div>
        </div>
        <div class="status-red"></div>
      </div>
      <div class="corner green">
        <button class="coloured-corner-green" data-color="green"></button>
      </div>
      <div class="corner red">
        <button class="coloured-corner-red" data-color="red"></button>
      </div>
      <div class="corner yellow">
        <button class="coloured-corner-yellow" data-color="yellow"></button>
      </div>
      <div class="corner blue">
        <button class="coloured-corner-blue" data-color="blue"></button>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
